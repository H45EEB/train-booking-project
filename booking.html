<!DOCTYPE html>
<html lang="en">
<head>
    <title>RailExpress - Template</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

<ul class="topnav">
    <li><a href="Home.html">Home</a></li>
    <li><a href="journey.html">Journey</a></li>
    <li class="active"><a href="booking.html">Booking</a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="contact.html">Contact Us</a></li>
    <li><a href="help.html">Help</a></li>
</ul>

<div class="container">
    <h1>Welcome!</h1>
    <h2>Select a journey and Reserve your seat</h2>
</div>


<div class="form-section">
    <div class="form-card">
        <h2>Book Your Train Ticket</h2>

        <form id="bookingForm" onsubmit="handleBooking(event)">

            <div>
                <div class="form-group">
                    <label for="fromStation">From</label>
                    <select id="fromStation" onchange="calculatePrice()" required>
                        <option value="">Departure</option>
                        <option value="Colombo">Colombo</option>
                        <option value="Mathara">Matara</option>
                        <option value="Galle">Galle</option>
                        <option value="Jaffna">Jaffna</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="toStation">To</label>
                    <select id="toStation" onchange="calculatePrice()" required>
                        <option value="">Destination</option>
                        <option value="Colombo">Colombo</option>
                        <option value="Mathara">Matara</option>
                        <option value="Galle">Galle</option>
                        <option value="Jaffna">Jaffna</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="travelDate">Date of Journey</label>
                <input type="date" id="travelDate" required>
            </div>

            <div class="form-group">
                <label for="numSeats">Number of Seats</label>
                <input type="number" id="numSeats" min="1" value="1" onchange="calculatePrice()" required>
            </div>

            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="nicPassport">NIC / Passport Number</label>
                <input type="text" id="nicPassport" placeholder="Enter NIC or Passport" required>
            </div>

            <div class="form-group">
                <label for="mobileNumber">Mobile Number</label>
                <input type="tel" id="mobileNumber" placeholder="Enter mobile number" required>
            </div>

            <div class="price-box">
                <h3 id="priceDisplay">Total Price: Rs.0</h3>
            </div>

            <button type="submit" class="submit-btn">Confirm Booking</button>

        </form>
    </div>
</div>

    

    <script href="java/index.js"></script>



<footer>
    <p>&copy; 2024 RailExpress Booking System. All rights reserved.</p>
</footer>

</body>
</html>
